# LP with HuggingFace pretrained DINOv3 (no local .pth)
# HuggingFace에서 pretrained weight 자동 다운로드 후 LP 실행

data:
  train_csv: "/home/tj/Research/foundation_model/dataset/DrNoon_CVD_v6_all_fundus_20260212_train.csv"
  val_csv: "/home/tj/Research/foundation_model/dataset/DrNoon_CVD_v6_all_fundus_20260212_val.csv"
  test_csv: "/home/tj/Research/foundation_model/dataset/DrNoon_CVD_v6_all_fundus_20260212_test.csv"
  image_column: "jpg_h1024_path"
  local_prefix: "/nas/mediwhale_processed_data/"
  preprocessing:
    use_drnoon_preprocess: true
    drnoon_precrop: 0.4
    drnoon_circle_mask: true

lp:
  # HuggingFace 모델 ID (로컬 .pth 아님). jaychempan/dinov3에서 자동 다운로드
  # 지원: facebook/dinov3-vits16-pretrain-lvd1689m, vitb16, vitl16
  dinov3_ckpt: "facebook/dinov3-vits16-pretrain-lvd1689m"
  model_arch: "dinov3_vits16"  # vits16 → dinov3_vits16, vitb16 → dinov3_vitb16, vitl16 → dinov3_vitl16
  tasks: ["dr", "amd", "glaucoma"]
  nb_classes:
    dr: 2
    amd: 2
    glaucoma: 2
  batch_size: 24
  epochs: 50
  warmup_epochs: 10
  num_processes: null   # null=1 (eval 기본). 8로 설정 시 8 GPU 사용
  gpu_id: 2          # num_processes=1일 때 사용할 GPU 번호. null=0번

seed: 0
