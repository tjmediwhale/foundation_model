name: Test

on:
    pull_request:
        branches: [main, dev]
    push:
        branches: [main, dev]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
        matrix:
          os: ["ubuntu-latest"]
          python-version: ["3.7", "3.8", "3.9", "3.10"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest
          pip install sh

      - name: Install with Kornia for Python != 3.7
        if: matrix.python-version != '3.7'
        run: |
          pip install .[kornia]

      - name: List dependencies
        run: |
          python -m pip list

      - name: Run pytest
        run: |
          pytest -v
