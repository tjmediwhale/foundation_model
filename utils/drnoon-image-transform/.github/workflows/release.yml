name: Release
run-name: Release package version ${{ github.event.release.tag_name }}

on:
  release:
    types: [published]

jobs:
  release:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.7
        uses: actions/setup-python@v3
        with:
          python-version: 3.7

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            twine \
            setuptools_scm \
            wheel \
            keyring \
            keyrings.google-artifactregistry-auth

      - name: Build package
        run: |
          python setup.py sdist bdist_wheel

      - name: Set up GCP credentials
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Push to GCP Artifact Registry
        run: |
          gcloud auth activate-service-account --key-file=$GOOGLE_GHA_CREDS_PATH
          twine upload --verbose --repository-url ${{ secrets.GCP_ARTIFACT_REGISTRY_URL }} dist/*
